server.port=8082
spring.application.name=movement-service

spring.datasource.url=jdbc:postgresql://localhost:5432/inventario_db
spring.datasource.username=postgres
spring.datasource.password=root

# 'create' recrea la tabla en cada arranque (útil en desarrollo temprano).
# Cámbialo a 'update' cuando el esquema esté estable para no perder datos.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
